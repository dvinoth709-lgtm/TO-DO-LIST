<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<style>
    body{
        height: 100vh;
        width: auto;
        background: linear-gradient(145deg,rgb(248, 244, 248),rgb(153, 194, 127),rgb(76, 179, 116),rgb(23, 110, 34),rgb(15, 4, 82));
        display: flex;
        align-items: flex-start;
        padding-top: 200px;
        justify-content: center;
    }
    #box1{
        height: 150px;
        width: 300px;
        background: linear-gradient(55deg,white,yellow,brown,red);
        display: flex;
        flex-direction: column;
        gap: 10px;
        justify-content: center;
        align-items: center;
        border: 1px solid white;
        border-radius: 30px 30px 0px 30px;
    }
    #inp{
        height: 30px;
        border: none;
        border-radius: 2%;
        outline: none;
        font-size: 20px;
    }
    #gf{
        height: 30px;
        width: 100px;
        border: none;
        border-radius: 10%;
        outline: none;
        color: rgb(44, 42, 42);
        font-size: 15px;
        cursor: pointer;
        background: linear-gradient(30deg,rgb(39, 25, 168)20%,white,rgb(81, 191, 211)70%);
    }
    #uu{
    
    display: flex;
    flex-direction: column;
    border-radius: 20px;
    padding:4px;
    list-style: none;
}
    h1{
        color: rgb(238, 233, 232);
        position: absolute;
        bottom:400px;left: 170px;
    }
    #g{
        height: 30px;
        width: 50px;
        border: none;
        border-radius: 10%;
        outline: none;
        color: white;
        background-color: rgb(228, 11, 11);
        font-size: 15px;
        cursor: pointer;
        margin-left: 10px;
    }
    #container{
    display: flex;
    flex-direction: column;
    align-items: center;
}
#uu li{
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin: 5px 0;
}
</style>
<body id="bod">
<h1>TO DO LIST</h1>
<div id="container">
    <div id="box1">
        <input type="text" id="inp">
        <button id="gf" onclick="vi(event)">submit</button>
    </div>
 <ul id="uu"></ul>
</div>
</body>
<script>
    function vi(event){
        let inpu=document.getElementById('inp');
        if(inpu.value.trim()!==""){
        let show=document.getElementById('uu')
        show.style.backgroundColor="black";
        show.style.color='white';
        show.style.border='2px solid';
        show.style.borderRadius="20px";
        let bos=document.createElement("li")
        bos.innerHTML=`<h3>${inpu.value}</h1>`+`<button id="g" onclick="btn(event)">X</button>`
        show.appendChild(bos)
        inpu.value="";
        
    }}
    function btn(event){
        event.target.parentElement.remove();
    }
</script>
</html>
